version: "3.9"

services:

  gateway:
    build: ./src/ApiGateway
    ports:
      - "5000:8080"
    depends_on:
      - auth
      - booking
      - venue
      - notification

  auth:
    build: ./src/Auth.Service
    ports:
      - "5001:8080"

  booking:
    build: ./src/BookingS.Service
    ports:
      - "5002:8080"

  venue:
    build: ./src/VenueBooking.Service
    ports:
      - "5003:8080"

  notification:
    build: ./src/Notification.Service
    ports:
      - "5004:8080"

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Pass123
    ports:
      - "1433:1433"